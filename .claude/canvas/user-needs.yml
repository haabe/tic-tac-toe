    importance: 10
    current_satisfaction: 9
    state: met
    evidence_sources:
      - type: "interview"
        summary: "Physical tic-tac-toe has zero friction — this must match it"
        date: "2026-04-07"
  - user_type: "Parent"
    need_statement: "As a parent, I need to play with my child remotely, so that we can stay connected when apart"
    type: emotional
    importance: 10
    current_satisfaction: 1
    state: underserved
    evidence_sources:
