# User Needs Mapping Canvas — Rich Allen
# Source: User Needs Mapping (connected to Wardley Mapping & Team Topologies)
# Populated through: /interview and discovery work

user_types:
  - name: "Parent"
    description: "Adult (e.g. 49yo developer) who wants to play with their child"
    context: "Away from home on work travel, or at home late at night when outdoor play isn't an option"
  - name: "Child"
    description: "Young player (e.g. 10yo boy) who loves tic-tac-toe in all forms"
    context: "At home on phone or PC, wants to play with parent or solo"

needs:
