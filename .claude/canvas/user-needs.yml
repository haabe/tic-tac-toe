        summary: "No current solution for remote play — only physical options exist"
        date: "2026-04-07"
  - user_type: "Child"
    need_statement: "As a child, I need a fun opponent when no one is available, so that I can play anytime I want"
    type: functional
    importance: 7
    current_satisfaction: 1
    state: underserved
    evidence_sources:
      - type: "interview"
        summary: "Physical play requires another person present"
        date: "2026-04-07"
  - user_type: "Parent"
    need_statement: "As a parent, I need the game to be safe and private, so that I can trust my child using it unsupervised"
    type: emotional
    importance: 9
    current_satisfaction: 3
    state: underserved
    evidence_sources:
      - type: "interview"
        summary: "No ads, no data collection, no purchases — explicit ethical boundaries"
        date: "2026-04-07"

opportunity_areas:
