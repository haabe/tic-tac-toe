    needs_included:
      - "Play with child remotely"
      - "Stay connected when apart"
    underserved_score: 9
    strategic_fit: "Core purpose — this is the primary reason the product exists"
  - name: "Solo play anytime"
    needs_included:
      - "Fun opponent when no one is available"
    underserved_score: 6
    strategic_fit: "Supports engagement when remote partner isn't available"

